[alembic]
# path to migration scripts, relative to this file
script_location = alembic

# sys.path is prepended with this so app.* imports resolve when running alembic
prepend_sys_path = .

version_path_separator = os

# sqlalchemy.url is set programmatically in env.py from app.config.settings
# so it does NOT need to be set here

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
